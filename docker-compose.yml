version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: mcp-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=4000
    env_file:
      - .env
